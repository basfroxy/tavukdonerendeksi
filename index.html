<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tavuk Döner Endeksi | GökBörü</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #f97316; --text: #e2e8f0; --border: #2d333b; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { font-size: 0.8rem; color: #94a3b8; margin: 0; text-transform: uppercase; }
        .card .val { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 40px;">
        <h1>Tavuk Döner Endeksi</h1>
        <p>Geliştiren: Hüseyin Furkan Mıklar | <span id="update-date">...</span></p>
    </header>

    <div class="stats">
        <div class="card">
            <h3>Güncel TL Fiyatı</h3>
            <div class="val" id="price-tl">₺0</div>
        </div>
        <div class="card">
            <h3>Dolar Karşılığı</h3>
            <div class="val" id="price-usd">$0.00</div>
        </div>
        <div class="card">
            <h3>Maaş Karşılığı</h3>
            <div class="val" id="wage-qty">0 Adet</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 30px;">
        <h3>Fiyat Projeksiyonu</h3>
        <canvas id="mainChart"></canvas>
    </div>

    <table>
        <thead>
            <tr>
                <th>Dönem</th>
                <th>TL Fiyatı</th>
                <th>USD Kuru</th>
                <th>Alım Gücü</th>
            </tr>
        </thead>
        <tbody id="data-table"></tbody>
    </table>
</div>

<script>
    async function init() {
        try {
            // GitHub Pages'da dosya yolunun doğru olduğundan emin ol
            const res = await fetch('data.json');
            const data = await res.json();
            
            const history = data.history;
            const latest = history[history.length - 1];

            // NaN Hatalarını Önlemek İçin parseFloat Kullanımı
            const currentPrice = parseFloat(latest.price);
            const currentUsd = parseFloat(latest.usd_rate);
            const currentWage = parseFloat(latest.min_wage);

            document.getElementById('update-date').innerText = data.last_update;
            document.getElementById('price-tl').innerText = `₺${currentPrice}`;
            
            // Hesaplamalar
            const usdVal = (currentPrice / currentUsd).toFixed(2);
            const wageVal = Math.floor(currentWage / currentPrice);

            document.getElementById('price-usd').innerText = `$${usdVal}`;
            document.getElementById('wage-qty').innerText = `${wageVal} Adet`;

            // Tablo
            const tbody = document.getElementById('data-table');
            history.slice().reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td style="color:var(--accent)">₺${row.price}</td>
                    <td>₺${row.usd_rate}</td>
                    <td>${Math.floor(row.min_wage / row.price)} Adet</td>
                `;
                tbody.appendChild(tr);
            });

            // Grafik
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{
                        label: 'Fiyat (TL)',
                        data: history.map(h => h.price),
                        borderColor: '#f97316',
                        tension: 0.4
                    }]
                },
                options: { scales: { y: { grid: { color: '#2d333b' } } } }
            });

        } catch (err) {
            console.error("Yükleme Hatası:", err);
            document.body.innerHTML += `<p style="color:red; text-align:center">Veri yüklenemedi: ${err.message}</p>`;
        }
    }
    init();
</script>

</body>
</html>
